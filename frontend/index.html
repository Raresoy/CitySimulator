<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Smart City Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
         :root {
            --bg: #0a0e1a;
            --panel: #111827;
            --card: #1a2235;
            --border: #1e2d45;
            --accent: #00d4ff;
            --accent2: #ff6b35;
            --green: #00ff88;
            --amber: #ffb800;
            --red: #ff3b3b;
            --text: #e2e8f0;
            --muted: #64748b;
            --font: 'Space Grotesk', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            min-height: 100vh;
            overflow: hidden
        }
        
        #app {
            display: grid;
            grid-template-columns: 1fr 280px;
            grid-template-rows: 52px 1fr;
            height: 100vh;
            gap: 0
        }
        
        #header {
            grid-column: 1/-1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            z-index: 10
        }
        
        #header .logo {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: .5px;
            color: var(--accent)
        }
        
        #header .logo span {
            color: var(--text)
        }
        
        #status-pills {
            display: flex;
            gap: 8px;
            margin-left: auto
        }
        
        .pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            font-family: var(--mono);
            border: 1px solid
        }
        
        .pill.ok {
            color: var(--green);
            border-color: var(--green);
            background: rgba(0, 255, 136, .07)
        }
        
        .pill.warn {
            color: var(--amber);
            border-color: var(--amber);
            background: rgba(255, 184, 0, .07)
        }
        
        .pill.crit {
            color: var(--red);
            border-color: var(--red);
            background: rgba(255, 59, 59, .07)
        }
        
        #tick-display {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            margin-left: 8px
        }
        
        #map-area {
            position: relative;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }
        
        #city-canvas {
            display: block
        }
        
        #side-panel {
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }
        
        .section {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border)
        }
        
        .section-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px
        }
        
        #metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px
        }
        
        .metric {
            background: var(--card);
            border-radius: 8px;
            padding: 8px 10px;
            border: 1px solid var(--border)
        }
        
        .metric .val {
            font-size: 22px;
            font-weight: 600;
            font-family: var(--mono);
            line-height: 1
        }
        
        .metric .lbl {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px
        }
        
        .metric.danger .val {
            color: var(--red)
        }
        
        .metric.warn .val {
            color: var(--amber)
        }
        
        .metric.ok .val {
            color: var(--green)
        }
        
        #controls {
            display: flex;
            flex-direction: column;
            gap: 8px
        }
        
        .ctrl-btn {
            width: 100%;
            padding: 9px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .15s
        }
        
        .ctrl-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }
        
        .ctrl-btn.danger {
            border-color: var(--red);
            color: var(--red)
        }
        
        .ctrl-btn.danger:hover {
            background: rgba(255, 59, 59, .1)
        }
        
        .ctrl-btn.primary {
            border-color: var(--accent);
            color: var(--accent)
        }
        
        .ctrl-btn.primary:hover {
            background: rgba(0, 212, 255, .1)
        }
        
        .ctrl-btn.active {
            background: rgba(255, 107, 53, .12);
            border-color: var(--accent2);
            color: var(--accent2)
        }
        
        #speed-row {
            display: flex;
            align-items: center;
            gap: 8px
        }
        
        #speed-row label {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap
        }
        
        #speed-slider {
            flex: 1;
            accent-color: var(--accent)
        }
        
        #ai-log {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0
        }
        
        .log-entry {
            background: var(--card);
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            font-size: 12px;
            line-height: 1.6
        }
        
        .log-entry .log-time {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 4px
        }
        
        .log-entry .log-text {
            color: var(--text)
        }
        
        .log-entry.ai-msg {
            border-color: var(--accent);
            background: rgba(0, 212, 255, .06)
        }
        
        .log-entry.ai-msg .log-label {
            color: var(--accent);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .5px;
            margin-bottom: 4px
        }
        
        .log-entry.event-msg {
            border-color: var(--accent2)
        }
        
        .log-entry.event-msg .log-label {
            color: var(--accent2);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .5px;
            margin-bottom: 4px
        }
        
        .typing {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: var(--accent);
            animation: blink .7s infinite
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: 0
            }
        }
        
        #ai-query-area {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px
        }
        
        #ai-query-area input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 10px;
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            outline: none
        }
        
        #ai-query-area input:focus {
            border-color: var(--accent)
        }
        
        #ai-query-area button {
            padding: 7px 12px;
            background: rgba(0, 212, 255, .1);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            font-size: 12px;
            cursor: pointer;
            font-family: var(--font);
            white-space: nowrap
        }
        
        #ai-query-area button:hover {
            background: rgba(0, 212, 255, .2)
        }
        
        #tooltip {
            position: fixed;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 100;
            max-width: 220px;
            line-height: 1.6
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="header">
            <div class="logo">CITY<span>SIM</span></div>
            <div class="pill ok" id="city-status">NOMINAL</div>
            <div id="status-pills">
                <span class="pill ok" id="pill-traffic">TRAFFIC OK</span>
                <span class="pill ok" id="pill-emergency">NO INCIDENTS</span>
            </div>
            <div id="tick-display">T+0</div>
        </div>
        <div id="map-area">
            <canvas id="city-canvas"></canvas>
        </div>
        <div id="side-panel">
            <div class="section">
                <div class="section-title">City Metrics</div>
                <div id="metrics">
                    <div class="metric ok" id="m-flow">
                        <div class="val" id="mv-flow">100%</div>
                        <div class="lbl">Traffic Flow</div>
                    </div>
                    <div class="metric ok" id="m-cong">
                        <div class="val" id="mv-cong">0</div>
                        <div class="lbl">Congested Roads</div>
                    </div>
                    <div class="metric ok" id="m-inc">
                        <div class="val" id="mv-inc">0</div>
                        <div class="lbl">Incidents</div>
                    </div>
                    <div class="metric ok" id="m-cars">
                        <div class="val" id="mv-cars">0</div>
                        <div class="lbl">Active Cars</div>
                    </div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Controls</div>
                <div id="controls">
                    <button class="ctrl-btn danger" id="btn-emergency" onclick="toggleEmergencyMode()">🚨 Place Emergency</button>
                    <button class="ctrl-btn primary" id="btn-ai" onclick="triggerAI()">🤖 AI Solve Now</button>
                    <button class="ctrl-btn" id="btn-clear" onclick="clearAll()">🧹 Clear All Incidents</button>
                    <div id="speed-row">
                        <label>Speed</label>
                        <input type="range" id="speed-slider" min="1" max="5" value="2" step="1" oninput="setSpeed(this.value)">
                        <span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:16px" id="speed-lbl">2×</span>
                    </div>
                </div>
            </div>
            <div class="section" style="border-bottom:none;padding-bottom:4px">
                <div class="section-title">AI Agent Log</div>
            </div>
            <div id="ai-log"></div>
            <div id="ai-query-area">
                <input type="text" id="ai-input" placeholder="Ask the AI agent..." onkeydown="if(event.key==='Enter')askAI()">
                <button onclick="askAI()">Ask ↗</button>
            </div>
        </div>
    </div>
    <div id="tooltip"></div>

    <script>
        // ─── CONFIG ───────────────────────────────────────────────
        const GRID = 7,
            CELL = 72,
            ROAD = 18;
        let W, H;
        const canvas = document.getElementById('city-canvas');
        const ctx = canvas.getContext('2d');

        // ─── STATE ────────────────────────────────────────────────
        let tick = 0,
            speed = 2,
            emergencyMode = false;
        let incidents = [],
            roads = [],
            cars = [];
        let aiThinking = false,
            lastAITick = -999;
        const animSpeed = [null, 60, 30, 15, 8, 3];

        // ─── INIT ─────────────────────────────────────────────────
        function initCanvas() {
            const area = document.getElementById('map-area');
            const rect = area.getBoundingClientRect();
            W = rect.width;
            H = rect.height;
            canvas.width = W;
            canvas.height = H;
        }

        function buildRoads() {
            roads = [];
            let id = 0;
            const ox = (W - (GRID - 1) * CELL - ROAD) / 2;
            const oy = (H - (GRID - 1) * CELL - ROAD) / 2;
            for (let gy = 0; gy < GRID; gy++)
                for (let gx = 0; gx < GRID - 1; gx++)
                    roads.push({
                        id: id++,
                        isHoriz: true,
                        gx,
                        gy,
                        x1: ox + gx * CELL + ROAD,
                        y1: oy + gy * CELL,
                        x2: ox + (gx + 1) * CELL,
                        y2: oy + gy * CELL + ROAD,
                        congestion: 0,
                        blocked: false
                    });
            for (let gx = 0; gx < GRID; gx++)
                for (let gy = 0; gy < GRID - 1; gy++)
                    roads.push({
                        id: id++,
                        isHoriz: false,
                        gx,
                        gy,
                        x1: ox + gx * CELL,
                        y1: oy + gy * CELL + ROAD,
                        x2: ox + gx * CELL + ROAD,
                        y2: oy + (gy + 1) * CELL,
                        congestion: 0,
                        blocked: false
                    });
        }

        // ─── HELPERS ──────────────────────────────────────────────
        function intersectionCenter(gx, gy) {
            const ox = (W - (GRID - 1) * CELL - ROAD) / 2;
            const oy = (H - (GRID - 1) * CELL - ROAD) / 2;
            return {
                x: ox + gx * CELL + ROAD / 2,
                y: oy + gy * CELL + ROAD / 2
            };
        }

        function roadMid(r) {
            return {
                x: (r.x1 + r.x2) / 2,
                y: (r.y1 + r.y2) / 2
            };
        }

        function getRoadBetween(gx1, gy1, gx2, gy2) {
            if (gx1 === gx2) {
                const gy = Math.min(gy1, gy2);
                return roads.find(r => !r.isHoriz && r.gx === gx1 && r.gy === gy) || null;
            } else {
                const gx = Math.min(gx1, gx2);
                return roads.find(r => r.isHoriz && r.gy === gy1 && r.gx === gx) || null;
            }
        }

        function congColor(c, blocked) {
            if (blocked) return '#ff3b3b';
            if (c > 0.7) return '#ff6b35';
            if (c > 0.4) return '#ffb800';
            return '#1e3a52';
        }

        // ─── PATHFINDING ──────────────────────────────────────────
        function findPath(gx1, gy1, gx2, gy2, ignoreBlocked = false) {
            const key = (x, y) => x + ',' + y;
            const q = [{
                gx: gx1,
                gy: gy1,
                path: [{
                    gx: gx1,
                    gy: gy1
                }]
            }];
            const visited = new Set([key(gx1, gy1)]);
            while (q.length) {
                const {
                    gx,
                    gy,
                    path
                } = q.shift();
                if (gx === gx2 && gy === gy2) return path;
                for (const [dx, dy] of[[1, 0], [-1, 0], [0, 1], [0, -1]]) {
                    const nx = gx + dx,
                        ny = gy + dy;
                    if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID) continue;
                    if (visited.has(key(nx, ny))) continue;
                    const r = getRoadBetween(gx, gy, nx, ny);
                    if (!ignoreBlocked && r && r.blocked) continue;
                    visited.add(key(nx, ny));
                    q.push({
                        gx: nx,
                        gy: ny,
                        path: [...path, {
                            gx: nx,
                            gy: ny
                        }]
                    });
                }
            }
            return ignoreBlocked ? null : findPath(gx1, gy1, gx2, gy2, true);
        }

        // ─── CARS ─────────────────────────────────────────────────
        function spawnCar() {
            const gx1 = Math.floor(Math.random() * GRID);
            const gy1 = Math.floor(Math.random() * GRID);
            let gx2, gy2;
            do {
                gx2 = Math.floor(Math.random() * GRID);
                gy2 = Math.floor(Math.random() * GRID);
            }
            while (gx2 === gx1 && gy2 === gy1);
            const path = findPath(gx1, gy1, gx2, gy2);
            if (!path || path.length < 2) return null;
            const c = intersectionCenter(gx1, gy1);
            const colors = ['#00d4ff', '#ff6b35', '#00ff88', '#ffb800', '#a78bfa', '#fb7185', '#34d399', '#f472b6'];
            return {
                x: c.x,
                y: c.y,
                gx: gx1,
                gy: gy1,
                targetGx: gx2,
                targetGy: gy2,
                path,
                step: 0,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: 1 + Math.random() * 0.5
            };
        }

        function updateCars() {
            while (cars.length < 30) {
                const c = spawnCar();
                if (c) cars.push(c);
                else break;
            }
            for (const car of cars) {
                if (car.step >= car.path.length - 1) {
                    const c = spawnCar();
                    if (c) Object.assign(car, c);
                    continue;
                }
                const next = car.path[car.step + 1];
                const nc = intersectionCenter(next.gx, next.gy);
                const r = getRoadBetween(car.path[car.step].gx, car.path[car.step].gy, next.gx, next.gy);
                const spd = r && r.congestion > 0.6 ? 0.3 : r && r.congestion > 0.3 ? 0.6 : 1;
                const dx = nc.x - car.x,
                    dy = nc.y - car.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const stepSize = Math.max(1, 4 * spd * speed / 2);
                if (dist < stepSize + 1) {
                    car.x = nc.x;
                    car.y = nc.y;
                    car.gx = next.gx;
                    car.gy = next.gy;
                    car.step++;
                    if (incidents.length > 0 && car.step < car.path.length - 2) {
                        const pr = getRoadBetween(car.path[car.step].gx, car.path[car.step].gy,
                            car.path[car.step + 1].gx, car.path[car.step + 1].gy);
                        if (pr && pr.blocked) {
                            const np = findPath(car.gx, car.gy, car.targetGx, car.targetGy);
                            if (np) {
                                car.path = np;
                                car.step = 0;
                            }
                        }
                    }
                } else {
                    car.x += dx / dist * stepSize;
                    car.y += dy / dist * stepSize;
                }
            }
            updateCongestion();
        }

        function updateCongestion() {
            for (const r of roads) {
                const mid = roadMid(r);
                let nearby = 0;
                for (const c of cars) {
                    if (Math.abs(c.x - mid.x) < CELL / 2 + 10 && Math.abs(c.y - mid.y) < CELL / 2 + 10) nearby++;
                }
                r.congestion = Math.min(1, nearby / 5);
                if (incidents.find(i => i.road === r.id)) r.congestion = Math.min(1, r.congestion + 0.5);
            }
        }

        // ─── DRAW ─────────────────────────────────────────────────
        function draw() {
            ctx.clearRect(0, 0, W, H);
            drawBlocks();
            drawRoads();
            drawIntersections();
            drawCars();
            drawIncidents();
            drawOverlay();
        }

        function drawBlocks() {
            const ox = (W - (GRID - 1) * CELL - ROAD) / 2;
            const oy = (H - (GRID - 1) * CELL - ROAD) / 2;
            for (let gx = 0; gx < GRID - 1; gx++) {
                for (let gy = 0; gy < GRID - 1; gy++) {
                    const bx = ox + gx * CELL + ROAD + 2,
                        by = oy + gy * CELL + ROAD + 2;
                    const bw = CELL - ROAD - 4,
                        bh = CELL - ROAD - 4;
                    ctx.fillStyle = '#0d1520';
                    ctx.beginPath();
                    roundRect(bx, by, bw, bh, 4);
                    ctx.fill();
                    const bcount = 3 + ((gx * 7 + gy * 3) % 4);
                    for (let b = 0; b < bcount; b++) {
                        const bh2 = 10 + ((gx * b * 3 + gy * b * 7) % 18);
                        const bx2 = bx + 3 + (b * (bw - 10) / bcount);
                        const bw2 = Math.floor((bw - 12) / bcount);
                        ctx.fillStyle = '#1a2535';
                        ctx.fillRect(bx2, by + bh - bh2 - 2, bw2, bh2);
                        if (bh2 > 10) {
                            ctx.fillStyle = 'rgba(255,200,50,0.25)';
                            ctx.fillRect(bx2 + 2, by + bh - bh2 + 2, 3, 3);
                            if (bh2 > 16) ctx.fillRect(bx2 + 2, by + bh - bh2 + 9, 3, 3);
                        }
                    }
                }
            }
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        function drawRoads() {
            for (const r of roads) {
                ctx.fillStyle = congColor(r.congestion, r.blocked);
                ctx.fillRect(r.x1, r.y1, r.x2 - r.x1, r.y2 - r.y1);
                if (!r.blocked) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([6, 8]);
                    ctx.beginPath();
                    if (r.isHoriz) {
                        const cy = (r.y1 + r.y2) / 2;
                        ctx.moveTo(r.x1, cy);
                        ctx.lineTo(r.x2, cy);
                    } else {
                        const cx = (r.x1 + r.x2) / 2;
                        ctx.moveTo(cx, r.y1);
                        ctx.lineTo(cx, r.y2);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }

        function drawIntersections() {
            for (let gx = 0; gx < GRID; gx++) {
                for (let gy = 0; gy < GRID; gy++) {
                    const c = intersectionCenter(gx, gy);
                    const nr = roads.filter(r => (r.isHoriz && r.gy === gy && (r.gx === gx || r.gx === gx - 1)) ||
                        (!r.isHoriz && r.gx === gx && (r.gy === gy || r.gy === gy - 1)));
                    const maxC = nr.reduce((m, r) => Math.max(m, r.congestion), 0);
                    const blocked = nr.some(r => r.blocked);
                    ctx.fillStyle = congColor(maxC, blocked);
                    ctx.fillRect(c.x - ROAD / 2, c.y - ROAD / 2, ROAD, ROAD);
                    const phase = (tick + gx * 13 + gy * 7) % 60;
                    ctx.fillStyle = blocked ? '#ff3b3b' : phase < 30 ? '#00ff88' : '#ff3b3b';
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawCars() {
            for (const car of cars) {
                ctx.save();
                ctx.shadowColor = car.color;
                ctx.shadowBlur = 8;
                ctx.fillStyle = car.color;
                ctx.beginPath();
                ctx.arc(car.x, car.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawIncidents() {
            for (const inc of incidents) {
                const r = roads[inc.road];
                const mid = roadMid(r);
                const pulse = Math.sin(tick * 0.15) * 0.3 + 0.7;
                ctx.save();
                ctx.globalAlpha = pulse;
                ctx.strokeStyle = '#ff3b3b';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(mid.x, mid.y, 16, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.font = '14px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(inc.icon, mid.x, mid.y);
                ctx.restore();
            }
        }

        function drawOverlay() {
            if (emergencyMode) {
                ctx.save();
                ctx.strokeStyle = '#ff6b35';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 4]);
                ctx.strokeRect(4, 4, W - 8, H - 8);
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(255,107,53,0.9)';
                ctx.font = 'bold 13px "Space Grotesk",sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText('🚨 CLICK A ROAD TO PLACE INCIDENT', W / 2, 10);
                ctx.restore();
            }
        }

        // ─── UI UPDATE ────────────────────────────────────────────
        function updateUI() {
            tick++;
            document.getElementById('tick-display').textContent = 'T+' + tick;
            const congestedCount = roads.filter(r => r.congestion > 0.4).length;
            const blockedCount = roads.filter(r => r.blocked).length;
            const flow = Math.max(0, Math.round(100 - congestedCount * 2 - blockedCount * 5));
            document.getElementById('mv-flow').textContent = flow + '%';
            document.getElementById('mv-cong').textContent = congestedCount;
            document.getElementById('mv-inc').textContent = incidents.length;
            document.getElementById('mv-cars').textContent = cars.length;
            document.getElementById('m-flow').className = 'metric ' + (flow > 70 ? 'ok' : flow > 40 ? 'warn' : 'danger');
            document.getElementById('m-cong').className = 'metric ' + (congestedCount < 5 ? 'ok' : congestedCount < 12 ? 'warn' : 'danger');
            document.getElementById('m-inc').className = 'metric ' + (incidents.length === 0 ? 'ok' : incidents.length < 3 ? 'warn' : 'danger');
            const tp = document.getElementById('pill-traffic');
            if (congestedCount > 10) {
                tp.className = 'pill crit';
                tp.textContent = 'HEAVY TRAFFIC';
            } else if (congestedCount > 5) {
                tp.className = 'pill warn';
                tp.textContent = 'CONGESTION';
            } else {
                tp.className = 'pill ok';
                tp.textContent = 'TRAFFIC OK';
            }
            const ep = document.getElementById('pill-emergency');
            if (incidents.length > 0) {
                ep.className = 'pill crit';
                ep.textContent = incidents.length + ' INCIDENT' + (incidents.length > 1 ? 'S' : '');
            } else {
                ep.className = 'pill ok';
                ep.textContent = 'NO INCIDENTS';
            }
            const cs = document.getElementById('city-status');
            if (incidents.length > 2 || congestedCount > 12) {
                cs.className = 'pill crit';
                cs.textContent = 'CRITICAL';
            } else if (incidents.length > 0 || congestedCount > 6) {
                cs.className = 'pill warn';
                cs.textContent = 'WARNING';
            } else {
                cs.className = 'pill ok';
                cs.textContent = 'NOMINAL';
            }
            if (incidents.length > 0 && tick - lastAITick > 90 && !aiThinking) {
                lastAITick = tick;
                runAutoAI();
            }
        }

        // ─── MAIN LOOP ────────────────────────────────────────────
        let frameTick = 0;

        function loop() {
            requestAnimationFrame(loop);
            frameTick++;
            if (frameTick % (animSpeed[speed] || 30) === 0) {
                updateCars();
                updateUI();
            }
            draw();
        }

        // ─── CONTROLS ─────────────────────────────────────────────
        function toggleEmergencyMode() {
            emergencyMode = !emergencyMode;
            const btn = document.getElementById('btn-emergency');
            btn.className = 'ctrl-btn ' + (emergencyMode ? 'active' : 'danger');
            btn.textContent = emergencyMode ? '❌ Cancel' : '🚨 Place Emergency';
        }

        function setSpeed(v) {
            speed = parseInt(v);
            document.getElementById('speed-lbl').textContent = v + '×';
        }

        function clearAll() {
            incidents = [];
            for (const r of roads) {
                r.blocked = false;
                r.congestion = 0;
            }
            for (const car of cars) {
                const np = findPath(car.gx, car.gy, car.targetGx, car.targetGy);
                if (np) {
                    car.path = np;
                    car.step = 0;
                }
            }
            addLog('event', 'All incidents cleared. Roads reopened. Vehicles rerouting.', '🧹');
        }

        // ─── CANVAS INTERACTION ───────────────────────────────────
        canvas.addEventListener('click', e => {
            if (!emergencyMode) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left,
                my = e.clientY - rect.top;
            let best = null,
                bestDist = 30;
            for (const r of roads) {
                const mid = roadMid(r);
                const d = Math.sqrt((mx - mid.x) ** 2 + (my - mid.y) ** 2);
                if (d < bestDist) {
                    bestDist = d;
                    best = r;
                }
            }
            if (best) {
                if (incidents.find(i => i.road === best.id)) {
                    addLog('event', 'Road already has an incident.', '⚠️');
                    return;
                }
                const icons = ['🚗', '🔥', '🚧', '⚡', '🌊'];
                const types = ['Vehicle Collision', 'Road Fire', 'Road Works', 'Power Line Down', 'Flooding'];
                const idx = Math.floor(Math.random() * icons.length);
                incidents.push({
                    road: best.id,
                    icon: icons[idx],
                    type: types[idx],
                    tick
                });
                best.blocked = true;
                addLog('event', types[idx] + ' on ' + (best.isHoriz ? 'E-W' : 'N-S') + ' road [' + best.gx + ',' + best.gy + ']', icons[idx]);
                toggleEmergencyMode();
                let rerouted = 0;
                for (const car of cars) {
                    if (!car.path[car.step + 1]) continue;
                    const pr = getRoadBetween(car.path[car.step].gx, car.path[car.step].gy,
                        car.path[car.step + 1].gx, car.path[car.step + 1].gy);
                    if (pr && pr.id === best.id) {
                        const np = findPath(car.gx, car.gy, car.targetGx, car.targetGy);
                        if (np) {
                            car.path = np;
                            car.step = 0;
                            rerouted++;
                        }
                    }
                }
                if (rerouted > 0) addLog('event', rerouted + ' vehicles rerouting...', '🔄');
            }
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left,
                my = e.clientY - rect.top;
            const tt = document.getElementById('tooltip');
            let found = null;
            for (const r of roads) {
                const mid = roadMid(r);
                if (Math.sqrt((mx - mid.x) ** 2 + (my - mid.y) ** 2) < 20) {
                    found = r;
                    break;
                }
            }
            if (found) {
                const inc = incidents.find(i => i.road === found.id);
                const status = found.blocked ? '🚫 BLOCKED' : found.congestion > 0.7 ? '🔴 Heavy' : found.congestion > 0.3 ? '🟡 Moderate' : '🟢 Clear';
                tt.style.display = 'block';
                tt.style.left = (e.clientX + 12) + 'px';
                tt.style.top = (e.clientY - 20) + 'px';
                tt.innerHTML = '<b>' + status + '</b><br>Congestion: ' + Math.round(found.congestion * 100) + '%' +
                    (inc ? '<br><span style="color:#ff6b35">⚠️ ' + inc.type + '</span>' : '') +
                    (emergencyMode ? '<br><span style="color:#64748b;font-size:10px">Click to place incident</span>' : '');
            } else tt.style.display = 'none';
        });
        canvas.addEventListener('mouseleave', () => document.getElementById('tooltip').style.display = 'none');

        // ─── LOG ──────────────────────────────────────────────────
        function addLog(type, text, icon = '') {
            const log = document.getElementById('ai-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (type === 'ai' ? 'ai-msg' : type === 'event' ? 'event-msg' : '');
            entry.innerHTML = '<div class="log-time">T+' + tick + '</div>' +
                (type === 'ai' ? '<div class="log-label">🤖 AI AGENT</div>' :
                    type === 'event' ? '<div class="log-label">' + icon + ' EVENT</div>' : '') +
                '<div class="log-text">' + text + '</div>';
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function addTyping() {
            const log = document.getElementById('ai-log');
            const entry = document.createElement('div');
            entry.id = 'ai-typing';
            entry.className = 'log-entry ai-msg';
            entry.innerHTML = '<div class="log-label">🤖 AI AGENT</div><div class="log-text">Analyzing city state<span class="typing"></span></div>';
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            return entry;
        }

        // ─── AI INTEGRATION ───────────────────────────────────────
        async function callClaude(prompt) {
            const congestedCount = roads.filter(r => r.congestion > 0.4).length;
            const flow = Math.max(0, Math.round(100 - congestedCount * 2 - roads.filter(r => r.blocked).length * 5));
            const incDetails = incidents.map(i => {
                const r = roads[i.road];
                return i.type + ' on ' + (r.isHoriz ? 'E-W' : 'N-S') + ' road at [' + r.gx + ',' + r.gy + ']';
            }).join('; ');
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    system: 'You are an AI traffic management agent for a ' + GRID + 'x' + GRID + ' smart city grid. Be concise (2-4 sentences). Current state — Traffic flow: ' + flow + '%, Congested roads: ' + congestedCount + ', Incidents: ' + incidents.length + (incDetails ? ' (' + incDetails + ')' : '') + ', Vehicles: ' + cars.length + ', Tick: ' + tick + '. Provide brief actionable advice.',
                    messages: [{
                        role: 'user',
                        content: prompt
                    }]
                })
            });
            const data = await resp.json();

        }

        const fallbacks = [
            () => 'Incident detected. Activating alternate route protocols. Diverting ' + Math.min(cars.length, 12) + ' vehicles via secondary corridors. Expected flow restoration in 4-6 ticks.',
            () => 'Traffic impact assessment complete. ' + roads.filter(r => r.blocked).length + ' segment(s) blocked. Adaptive signal timing engaged on surrounding intersections.',
            () => 'All systems nominal. Traffic flow at ' + Math.max(0, Math.round(100 - roads.filter(r => r.congestion > 0.4).length * 2)) + '%. Signal timing optimized for current vehicle density.'
        ];

        async function runAutoAI() {
            if (aiThinking) return;
            aiThinking = true;
            const typing = addTyping();
            try {
                const r = await callClaude('There are ' + incidents.length + ' active incident(s). Provide immediate traffic management recommendations.');
                typing.remove();
                addLog('ai', r);
            } catch {
                typing.remove();
                addLog('ai', fallbacks[incidents.length > 0 ? 0 : 2]());
            }
            aiThinking = false;
        }

        async function triggerAI() {
            if (aiThinking) {
                addLog('event', 'AI agent is still analyzing...', '⚠️');
                return;
            }
            aiThinking = true;
            const btn = document.getElementById('btn-ai');
            btn.textContent = '🤖 Analyzing...';
            btn.disabled = true;
            const typing = addTyping();
            try {
                const r = await callClaude(incidents.length > 0 ?
                    'Provide a comprehensive analysis and resolution plan for ' + incidents.length + ' active incident(s).' :
                    'City is running nominally. Provide optimization recommendations for traffic flow efficiency.');
                typing.remove();
                addLog('ai', r);
            } catch {
                typing.remove();
                addLog('ai', fallbacks[incidents.length > 0 ? 1 : 2]());
            }
            aiThinking = false;
            btn.textContent = '🤖 AI Solve Now';
            btn.disabled = false;
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const q = input.value.trim();
            if (!q || aiThinking) return;
            input.value = '';
            addLog('event', q, '💬');
            aiThinking = true;
            const typing = addTyping();
            try {
                const r = await callClaude(q);
                typing.remove();
                addLog('ai', r);
            } catch {
                typing.remove();
                addLog('ai', 'Unable to process request.');
            }
            aiThinking = false;
        }

        // ─── START ────────────────────────────────────────────────
        initCanvas();
        buildRoads();
        addLog('event', 'City simulation initialized. Grid: ' + GRID + '×' + GRID, '🏙️');
        addLog('event', 'Click "Place Emergency" then click any road to trigger an incident.', 'ℹ️');
        loop();
    </script>
</body>
